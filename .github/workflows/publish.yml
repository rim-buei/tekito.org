name: Publish
permissions: {}

on:
  push:
    branches:
      - main

env:
  # renovate: datasource=github-releases depName=gohugoio/hugo
  HUGO_VERSION: 0.163.3

jobs:
  publish:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: true
          fetch-depth: 0

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}

      - name: Tweak hugo.toml
        run: |
          sed -E 's|^(author[[:space:]]*=[[:space:]]*)".*"|\1"${{ secrets.AUTHOR }}"|' -i hugo.toml

      - name: Build
        run: hugo --minify

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Upload contents to the S3 bucket
        run: |
          aws s3 sync --quiet --delete ./public s3://${{ secrets.AWS_S3_BUCKET }}
